# Example nginx location block for VMware STIG Tool alongside STIG Manager.
# Merge into your existing stigman.tad.ds.usace.army.mil server block.
#
# Prerequisites in .env on the STIG tool:
#   APP_ROOT_PATH=/vmstigtool
#   APP_PUBLIC_URL=https://stigman.tad.ds.usace.army.mil/vmstigtool
#   OIDC_ENABLED=true
#   OIDC_ISSUER_URL=https://<keycloak-host>/realms/<realm>
#   OIDC_CLIENT_ID=vmstig-tool
#   OIDC_CLIENT_SECRET=<secret>
#   OIDC_REDIRECT_URI=https://stigman.tad.ds.usace.army.mil/vmstigtool/auth/callback
#
# The web service registers DNS alias "vmstigtool" on the shared Docker network (Stigman).
# Do NOT use a hardcoded container IP (e.g. 172.20.0.10) — it changes after recreate.

# --- nginx running ON THE DOCKER HOST (not in a container) ---
location /vmstigtool/ {
    proxy_pass http://127.0.0.1:8081/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /vmstigtool;
    proxy_read_timeout 7200s;
}

# --- nginx running IN A CONTAINER on the same "Stigman" Docker network ---
# Use Docker DNS (127.0.0.11), not a fixed IP. Example upstream block:
#
# upstream vmstigtool_web {
#     server vmstigtool:8081;
# }
#
# location /vmstigtool/ {
#     proxy_pass http://vmstigtool_web/;
#     proxy_http_version 1.1;
